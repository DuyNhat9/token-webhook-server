name: Auto Refresh Token

on:
  schedule:
    - cron: '0 */2 * * *'  # Mỗi 2 giờ
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh Token
        run: |
          curl -X POST "${{ secrets.SERVER_URL }}/auto-refresh" \
               -H "Content-Type: application/json" \
               -d '{"secret": "${{ secrets.CRON_SECRET }}"}'
